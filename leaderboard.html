<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fat &amp; Muscle Challenge — Leaderboard</title>
<style>
  :root{
    --black:#111111;--white:#FFFFFF;--snow:#FAFAFA;
    --grey-100:#F5F5F5;--grey-200:#E5E5E5;--grey-300:#CACACB;--grey-500:#707072;
    --red:#D30005;--green:#007D48;--blue:#1151FF;--gold:#FCA600;
    --sans:'Helvetica Neue',Helvetica,Arial,sans-serif;
    --display:'Arial Narrow','Helvetica Neue',Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--white);color:var(--black);padding:0;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1440px;margin:0 auto;padding:40px 48px 56px;}
  @media(max-width:640px){.wrap{padding:24px 20px 40px;}}

  .page-header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;border-bottom:1px solid var(--grey-200);padding-bottom:24px;margin-bottom:16px;}
  .page-header .eyebrow{font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--grey-500);margin-bottom:12px;}
  .page-header h1{font-family:var(--display);font-weight:800;text-transform:uppercase;line-height:.9;letter-spacing:-.01em;font-size:clamp(40px,7vw,72px);}
  .hbadges{display:flex;gap:6px;flex-wrap:wrap;}
  .hbadge{border:1px solid var(--grey-300);border-radius:30px;padding:6px 12px;text-align:center;}
  .hbadge.r4{background:var(--black);border-color:var(--black);}
  .hbadge.r4 .hl,.hbadge.r4 .hv{color:#fff;}
  .hbadge .hl{font-size:10px;color:var(--grey-500);text-transform:uppercase;letter-spacing:.05em;}
  .hbadge .hv{font-size:11px;font-weight:500;color:var(--black);margin-top:1px;}
  .rule-box{border:1px solid var(--grey-200);border-radius:12px;padding:13px 18px;margin:14px 0 22px;font-size:12px;color:var(--grey-500);display:flex;flex-wrap:wrap;gap:10px 28px;align-items:flex-start;}
  .rule-box strong{color:var(--black);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px;}
  .rule-item{display:flex;align-items:center;gap:6px;}
  .rdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--black);}

  .round-block{margin-bottom:28px;}
  .round-header{background:var(--black);border-radius:14px;padding:14px 22px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .round-header h2{font-family:var(--display);font-weight:800;text-transform:uppercase;letter-spacing:-.005em;font-size:24px;color:#fff;}
  .round-header .sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:3px;}
  .round-count-badge{border:1px solid rgba(255,255,255,.3);border-radius:30px;padding:5px 12px;font-size:11px;font-weight:500;color:#fff;letter-spacing:.02em;}
  .round-header.latest{position:relative;}
  .latest-tag{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:#fff;color:var(--black);border-radius:30px;padding:3px 9px;margin-left:10px;vertical-align:middle;}

  .rank-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:780px){.rank-cols{grid-template-columns:1fr;}}
  .rank-panel{background:var(--white);border:1px solid var(--grey-200);border-radius:20px;overflow:hidden;}
  .rank-panel-header{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--grey-200);}
  .rph-title{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;color:var(--black);}
  .rph-sub{font-size:11px;color:var(--grey-500);margin-top:2px;}
  .rph-badge{font-size:10px;font-weight:500;padding:3px 10px;border-radius:30px;letter-spacing:.02em;}
  .rank-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--grey-100);position:relative;}
  .rank-row:last-child{border-bottom:none;}
  .rr-num{font-family:var(--display);font-size:18px;font-weight:800;width:30px;flex-shrink:0;text-align:center;}
  .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
  .rr-name{font-size:13px;font-weight:500;flex:1;min-width:0;}
  .rr-name .rr-sub{font-size:10px;color:var(--grey-500);font-weight:400;}
  .rr-metrics{display:flex;flex-direction:column;gap:2px;min-width:110px;}
  .rr-metric{display:flex;align-items:center;gap:4px;font-size:10px;}
  .rr-metric-lbl{color:var(--grey-500);width:18px;flex-shrink:0;}
  .rr-bar-track{flex:1;height:5px;background:var(--grey-100);border-radius:3px;overflow:hidden;}
  .rr-bar-fill{height:100%;border-radius:3px;}
  .rr-delta{font-size:11px;font-weight:500;width:48px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums;}
  .rr-score{text-align:right;min-width:46px;flex-shrink:0;}
  .rr-score .sv{font-family:var(--display);font-size:22px;font-weight:800;line-height:1;}
  .rr-score .su{font-size:9px;color:var(--grey-500);text-transform:uppercase;letter-spacing:.04em;}
  .rr-gold{background:var(--snow);}
  .rr-last{background:#FFF5F5;}
  .ribbon{position:absolute;top:0;right:0;font-size:8px;font-weight:700;padding:3px 9px;border-radius:0 18px 0 8px;letter-spacing:.08em;text-transform:uppercase;}
  .tie-b{font-size:8px;font-weight:500;background:var(--grey-100);color:var(--grey-500);border-radius:30px;padding:1px 6px;margin-left:4px;vertical-align:middle;text-transform:uppercase;letter-spacing:.04em;}
  .na-note{font-size:11px;color:var(--grey-500);font-style:italic;text-align:center;padding:11px;border-bottom:1px solid var(--grey-100);}
  .missed-section{margin-top:12px;}
  .missed-title{font-size:11px;font-weight:500;color:var(--grey-500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;}
  .missed-chips{display:flex;flex-wrap:wrap;gap:6px;}
  .missed-chip{border:1px dashed var(--grey-300);border-radius:30px;padding:5px 12px 5px 6px;display:flex;align-items:center;gap:7px;font-size:11px;color:var(--grey-500);}
  .missed-chip .mc-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;}
  .footer{margin-top:8px;text-align:left;font-size:12px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--grey-500);border-top:1px solid var(--grey-200);padding-top:20px;}

  .podium-container{border:1px solid var(--grey-200);border-radius:20px;padding:20px 16px 0;margin-bottom:12px;text-align:center;}
  .podium-heading{font-size:11px;font-weight:500;color:var(--grey-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px;}
  .podium-stage{display:flex;justify-content:center;align-items:flex-end;gap:8px;}
  .podium-slot{display:flex;flex-direction:column;align-items:center;}
  .podium-avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;margin-bottom:4px;}
  .podium-person{display:flex;flex-direction:column;align-items:center;gap:3px;margin-bottom:4px;}
  .podium-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;}
  .podium-pname{font-size:11px;font-weight:500;color:var(--black);}
  .podium-score{font-size:10px;font-weight:500;margin-bottom:6px;font-variant-numeric:tabular-nums;}
  .podium-step{border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;}
  .podium-step-label{font-family:var(--display);font-size:15px;font-weight:800;color:#fff;}
  @media print{@page{size:A3 portrait;margin:10mm;}.rank-row{break-inside:avoid;}}
</style>
</head>
<body>
<div class="wrap">
<div class="page-header">
  <div><div class="eyebrow">Improvement vs previous round &amp; cumulative vs baseline</div><h1>Leader<br>board</h1></div>
  <div class="hbadges" id="hbadges"></div>
</div>
<div class="rule-box">
  <div><strong>Scoring</strong><div class="rule-item"><div class="rdot"></div>Score = fat reduction (pp) + muscle gain (pp) · higher is better</div></div>
  <div><strong>Two dimensions</strong>
    <div class="rule-item" style="margin-bottom:3px"><div class="rdot"></div><strong style="display:inline;margin:0">vs Previous:</strong>&nbsp;improvement this round (R N vs R N−1)</div>
    <div class="rule-item"><div class="rdot"></div><strong style="display:inline;margin:0">vs Baseline:</strong>&nbsp;cumulative change from baseline</div>
  </div>
</div>
<div id="leaderboard"></div>
<div class="footer" id="footer"></div>
</div>

<!-- Data is generated from the spreadsheet by build_data.py -->
<script src="data.js"></script>
<script>
const R=window.RACE;
const NAMES=R.NAMES;
const LATEST=R.LATEST;
const A={};R.athletes.forEach(a=>A[a.name]=a);
const baseOf=a=>({bf:a.stages[0].fat,mu:a.stages[0].muscle});
const meas=(n,s)=>{const st=A[n].stages[s];return st&&st.present?{bf:st.fat,mu:st.muscle}:null;};
const measuredNames=s=>NAMES.filter(n=>meas(n,s));
const CM=n=>A[n].style?A[n].style.color:'#707072';

function sc(bf_from,mu_from,bf_to,mu_to){return+((bf_from-bf_to)+(mu_to-mu_from)).toFixed(2);}
function scolor(s){return s>0?'#007D48':s<0?'#D30005':'#707072';}
function sgn(v){return v>=0?'+':'−';}
function f(v,d=2){return Math.abs(v).toFixed(d);}
function ini(n){return n.substring(0,2).toUpperCase();}
function barPct(delta,maxAbs){return maxAbs>0?Math.min(100,Math.abs(delta)/maxAbs*100):2;}

function buildRankPanel(title,subtitle,badgeText,rows,naNote){
  const scored=rows.map(r=>({...r,fat_d:+(r.bf_from-r.bf_to).toFixed(2),mu_d:+(r.mu_to-r.mu_from).toFixed(2),score:sc(r.bf_from,r.mu_from,r.bf_to,r.mu_to)})).sort((a,b)=>b.score-a.score);
  const maxFat=Math.max(...scored.map(r=>Math.abs(r.fat_d)),0.01);
  const maxMu=Math.max(...scored.map(r=>Math.abs(r.mu_d)),0.01);
  let html=`<div class="rank-panel"><div class="rank-panel-header"><div><div class="rph-title">${title}</div><div class="rph-sub">${subtitle}</div></div><div class="rph-badge" style="background:#F5F5F5;color:#111111;border:1px solid #CACACB">${badgeText}</div></div>`;
  if(naNote)html+=`<div class="na-note">${naNote}</div>`;
  if(!scored.length)html+=`<div class="na-note">No measurements yet</div>`;
  scored.forEach((r,i)=>{
    const rank=i+1,isFirst=rank===1,isLast=rank===scored.length&&r.score<0;
    const prevScore=i>0?scored[i-1].score:null,nextScore=i<scored.length-1?scored[i+1].score:null;
    const isTie=(prevScore===r.score)||(nextScore===r.score);
    let rowClass='',ribbon='';
    if(isFirst){rowClass='rr-gold';ribbon=`<div class="ribbon" style="background:#FCA600;color:#111">TOP</div>`;}
    else if(isLast){rowClass='rr-last';ribbon=`<div class="ribbon" style="background:#D30005;color:#fff">LAST</div>`;}
    const medals={1:'🥇',2:'🥈',3:'🥉'};
    const numDisplay=medals[rank]||`${rank}`;
    const tieBadge=isTie?`<span class="tie-b">Tie</span>`:'';
    const fatBarPct=barPct(r.fat_d,maxFat),muBarPct=barPct(r.mu_d,maxMu);
    const fatBarCol=r.fat_d>=0?'#007D48':'#D30005',muBarCol=r.mu_d>=0?'#1151FF':'#D30005';
    const fatColor=r.fat_d>=0?'#007D48':'#D30005',muColor=r.mu_d>=0?'#1151FF':'#D30005';
    html+=`<div class="rank-row ${rowClass}">${ribbon}<div class="rr-num" style="color:${isFirst?'#111':isLast?'#D30005':'#707072'}">${numDisplay}</div><div class="avatar" style="background:${CM(r.name)}">${ini(r.name)}</div><div class="rr-name">${r.name}${tieBadge}<div class="rr-sub">${r.bf_from.toFixed(1)}% → ${r.bf_to.toFixed(1)}% fat</div></div><div class="rr-metrics"><div class="rr-metric"><div class="rr-metric-lbl">Fat</div><div class="rr-bar-track"><div class="rr-bar-fill" style="width:${fatBarPct}%;background:${fatBarCol}"></div></div><div class="rr-delta" style="color:${fatColor}">${sgn(r.fat_d)}${f(r.fat_d)}</div></div><div class="rr-metric"><div class="rr-metric-lbl">Mu</div><div class="rr-bar-track"><div class="rr-bar-fill" style="width:${muBarPct}%;background:${muBarCol}"></div></div><div class="rr-delta" style="color:${muColor}">${sgn(r.mu_d)}${f(r.mu_d)}</div></div></div><div class="rr-score"><div class="sv" style="color:${scolor(r.score)}">${sgn(r.score)}${f(Math.abs(r.score))}</div><div class="su">pp</div></div></div>`;
  });
  return html+`</div>`;
}

function missedChips(names,note){
  if(!names.length)return'';
  const chips=names.map(n=>`<div class="missed-chip"><div class="mc-av" style="background:${CM(n)||'#707072'}">${ini(n)}</div>${n}</div>`).join('');
  return`<div class="missed-section"><div class="missed-title">Not ranked — ${note}</div><div class="missed-chips">${chips}</div></div>`;
}

function buildPodium(rows,heading){
  const scored=rows.map(r=>({...r,score:sc(r.bf_from,r.mu_from,r.bf_to,r.mu_to)})).sort((a,b)=>b.score-a.score);
  if(!scored.length)return'';
  const groups=[];let idx=0,rankNum=1;
  while(idx<scored.length&&groups.length<3){const gs=scored[idx].score;const m=[];while(idx<scored.length&&scored[idx].score===gs){m.push(scored[idx]);idx++;}groups.push({rank:rankNum,score:gs,members:m});rankNum+=m.length;}
  while(groups.length<3)groups.push(null);
  const display=[{group:groups[1],height:60,color:'#CACACB',label:'2'},{group:groups[0],height:90,color:'#FCA600',label:'1'},{group:groups[2],height:45,color:'#707072',label:'3'}];
  function personHTML(m,bc){return`<div class="podium-person"><div style="border-radius:50%;border:3px solid ${bc};padding:2px;display:inline-block"><div class="podium-av" style="background:${CM(m.name)}">${ini(m.name)}</div></div><div class="podium-pname">${m.name}</div></div>`;}
  function slotHTML({group,height,color,label}){const sw=group&&group.members.length>1?108:88;if(!group)return`<div class="podium-slot" style="width:${sw}px"><div style="height:${height}px"></div></div>`;const sc2=scolor(group.score);const tb=group.members.length>1?`<span class="tie-b">Tie</span>`:'';return`<div class="podium-slot" style="width:${sw}px"><div class="podium-avatar-wrap">${group.members.map(m=>personHTML(m,color)).join('')}</div><div class="podium-score" style="color:${sc2}">${group.score>=0?'+':'−'}${Math.abs(group.score).toFixed(2)}pp${tb?' '+tb:''}</div><div class="podium-step" style="height:${height}px;width:${sw}px;background:${color}"><span class="podium-step-label">${label}</span></div></div>`;}
  let out=`<div class="podium-container"><div class="podium-heading">${heading||'Top 3'}</div><div class="podium-stage">`;
  for(const slot of display)out+=slotHTML(slot);
  return out+`</div></div>`;
}

(function(){
  let h='';
  for(let st=0;st<=LATEST;st++){
    const cls=st===LATEST?' r4':'';
    const lbl=st===0?'Baseline':('Round '+st);
    h+=`<div class="hbadge${cls}"><div class="hl">${lbl}</div><div class="hv">${R.STAGE_DATES[st]} 2026</div></div>`;
  }
  document.getElementById('hbadges').innerHTML=h;
})();

let html='';
for(let st=LATEST;st>=1;st--){
  const measured=measuredNames(st);
  const n=NAMES.length, k=measured.length, absent=NAMES.filter(x=>!meas(x,st));
  const isLatest=st===LATEST;
  const tag=isLatest?`<span class="latest-tag">Latest</span>`:'';
  const sub=`${R.STAGE_DATES[st]} 2026 · ${k} of ${n} measured${absent.length?` · ${absent.length} absent`:''}`;
  const vsBase=measured.map(name=>({name,bf_from:baseOf(A[name]).bf,mu_from:baseOf(A[name]).mu,bf_to:meas(name,st).bf,mu_to:meas(name,st).mu}));
  let vsPrev,prevNote=null;
  if(st===1){ vsPrev=vsBase; }
  else{
    const havePrev=measured.filter(name=>meas(name,st-1));
    const noPrev=measured.filter(name=>!meas(name,st-1));
    vsPrev=havePrev.map(name=>({name,bf_from:meas(name,st-1).bf,mu_from:meas(name,st-1).mu,bf_to:meas(name,st).bf,mu_to:meas(name,st).mu}));
    if(noPrev.length)prevNote=`${noPrev.join(', ')} skipped R${st-1} — excluded from R${st-1}→R${st} ranking`;
  }
  html+=`<div class="round-block"><div class="round-header${isLatest?' latest':''}"><div><h2>Round ${st}${tag}</h2><div class="sub">${sub}</div></div><div class="round-count-badge">${k} / ${n} measured</div></div>`;
  html+=buildPodium(vsBase,`Round ${st} podium — cumulative vs baseline`);
  html+=`<div class="rank-cols">`;
  const prevTitle=st===1?'vs Previous (= baseline)':`vs Previous (R${st-1}→R${st})`;
  const prevSub=st===1?'First round — same as vs baseline':`Improvement made in Round ${st}`;
  html+=buildRankPanel(prevTitle,prevSub,st===1?'Baseline':`R${st-1}→R${st}`,vsPrev,prevNote);
  html+=buildRankPanel('vs Baseline (cumulative)',`Total change from ${R.STAGE_DATES[0]} 2026`,'vs Base',vsBase,null);
  html+=`</div>`;
  html+=missedChips(absent,`Absent Round ${st}`);
  html+=`</div>`;
}
document.getElementById('leaderboard').innerHTML=html;
document.getElementById('footer').innerHTML=`Mija Body Composition Scale S400 &nbsp;·&nbsp; ${R.STAGE_DATES[0]} – ${R.STAGE_DATES[LATEST]} 2026 &nbsp;·&nbsp; ${NAMES.length} athletes`;
</script>
</body>
</html>
