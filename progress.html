<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fat &amp; Muscle Campaign — Progress Report</title>
<style>
  :root {
    --fat:#EF4444;--bg:#F1F5F9;--card:#FFFFFF;--text:#1E293B;--sub:#64748B;--border:#E2E8F0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:24px 18px;}
  .page-header{background:linear-gradient(135deg,#0F172A,#1E3A5F);border-radius:16px;padding:24px 28px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .page-header h1{font-size:20px;font-weight:800;color:#fff;}
  .page-header p{font-size:11px;color:#94A3B8;margin-top:4px;}
  .header-dates{display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;}
  .date-badge{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:9px;padding:8px 13px;text-align:center;}
  .date-badge.latest{background:rgba(168,85,247,.18);border-color:rgba(168,85,247,.5);}
  .date-badge .lb{font-size:9px;color:#94A3B8;text-transform:uppercase;letter-spacing:.6px;}
  .date-badge .vl{font-size:11px;font-weight:700;color:#fff;margin-top:2px;}
  .summary-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
  .sc{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
  .sc-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);}
  .sc-val{font-size:24px;font-weight:800;margin:4px 0 2px;}
  .sc-sub{font-size:10px;color:var(--sub);}
  .sc-gray .sc-val{color:var(--sub);}
  .sc-green .sc-val{color:#22C55E;}
  .sc-fat .sc-val{color:#EF4444;}
  .sc-muscle .sc-val{color:#3B82F6;}
  .legend{display:flex;gap:16px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);}
  .lswatch{width:14px;height:10px;border-radius:2px;}
  .avg-panel{background:linear-gradient(135deg,#0F172A,#1E3A5F);border-radius:14px;padding:20px 24px;margin-bottom:20px;}
  .avg-panel h2{font-size:13px;font-weight:800;color:#fff;margin-bottom:14px;}
  .avg-rounds{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .avg-round-title{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#94A3B8;margin-bottom:10px;font-weight:700;}
  .avg-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .avg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .avg-lbl{font-size:10px;color:#94A3B8;width:76px;flex-shrink:0;}
  .avg-val{font-size:12px;font-weight:700;color:#fff;}
  .avg-delta{font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;margin-left:auto;}
  .avg-bar-wrap{height:4px;border-radius:3px;margin-bottom:8px;}
  .avg-bar-fill{height:100%;border-radius:3px;}
  .section-title{font-size:12px;font-weight:700;color:#334155;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:8px;}
  .section-title span{font-size:10px;font-weight:400;text-transform:none;color:var(--sub);letter-spacing:0;}
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px;margin-bottom:24px;}
  .person-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:18px 20px;}
  .person-card:hover{box-shadow:0 4px 18px rgba(0,0,0,.08);}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .card-identity{display:flex;align-items:center;gap:9px;}
  .avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;}
  .name-text h3{font-size:13px;font-weight:700;}
  .name-text p{font-size:10px;color:var(--sub);margin-top:1px;}
  .badge{font-size:9px;font-weight:700;padding:3px 9px;border-radius:16px;white-space:nowrap;}
  .badge-improved{background:#DCFCE7;color:#15803D;}
  .badge-declined{background:#FEE2E2;color:#B91C1C;}
  .badge-mixed{background:#FEF9C3;color:#92400E;}
  .badge-skip{background:#F1F5F9;color:#64748B;}
  .chart-section{margin-top:2px;}
  .chart-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--sub);margin-bottom:8px;}
  .bar-chart{display:flex;flex-direction:column;gap:7px;}
  .bar-row{display:flex;align-items:center;gap:8px;}
  .bar-row-label{font-size:9px;color:var(--sub);width:58px;flex-shrink:0;text-align:right;}
  .bar-outer{flex:1;background:#F1F5F9;border-radius:4px;height:18px;position:relative;overflow:hidden;}
  .bar-inner{height:100%;border-radius:4px;position:relative;display:flex;align-items:center;}
  .bar-value{position:absolute;right:6px;font-size:9px;font-weight:700;color:#fff;white-space:nowrap;}
  .delta-tag{font-size:9px;font-weight:700;padding:1px 5px;border-radius:5px;flex-shrink:0;width:52px;text-align:center;}
  .dt-gf{background:#DCFCE7;color:#15803D;}
  .dt-bf{background:#FEE2E2;color:#B91C1C;}
  .dt-gm{background:#DBEAFE;color:#1D4ED8;}
  .dt-bm{background:#FEE2E2;color:#B91C1C;}
  .dt-n{background:#F1F5F9;color:#94A3B8;}
  .chart-divider{border:none;border-top:1px dashed #E2E8F0;margin:10px 0;}
  .skip-note{background:#FFF7ED;border:1px solid #FDE68A;border-radius:7px;padding:7px 11px;font-size:10px;color:#92400E;margin-top:10px;}
  .missed-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:24px;}
  .missed-card{background:#fff;border:1px dashed #CBD5E1;border-radius:12px;padding:14px 16px;opacity:.75;}
  .footer{text-align:center;font-size:10px;color:#94A3B8;padding-top:12px;border-top:1px solid var(--border);}
  @media(max-width:640px){.summary-strip{grid-template-columns:1fr 1fr;}.avg-rounds{grid-template-columns:1fr;}.cards-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="page-header">
  <div>
    <h1>🏋️ Fat &amp; Muscle Campaign — Progress Report</h1>
    <p>Body composition tracking · Mija Body Composition Scale S400 · Changes shown vs baseline per measurement round</p>
  </div>
  <div class="header-dates" id="header-dates"></div>
</div>

<div class="summary-strip" id="summary-strip"></div>

<div class="legend" id="legend"></div>

<div class="avg-panel">
  <h2>📊 Group Averages — Round by Round (baseline participants only)</h2>
  <div class="avg-rounds" id="avg-rounds"></div>
</div>

<div class="section-title" id="measured-title"></div>
<div class="cards-grid" id="cards-measured"></div>

<div class="section-title" id="absent-title"></div>
<div class="missed-grid" id="cards-pending"></div>

<div class="footer" id="footer"></div>

<!-- Data is generated from the spreadsheet by build_data.py -->
<script src="data.js"></script>
<script>
const R = window.RACE;
const NAMES = R.NAMES;
const ALL = [...NAMES].sort((a,b)=>a.localeCompare(b));
const COLORS=['#6366F1','#EC4899','#14B8A6','#F59E0B','#8B5CF6','#10B981','#EF4444','#3B82F6','#F97316','#06B6D4','#84CC16','#A855F7','#22D3EE','#FB923C'];
const colorMap={}; ALL.forEach((n,i)=>colorMap[n]=COLORS[i%COLORS.length]);
const LATEST = R.LATEST;

// Per-round bar colours (baseline grey, then a fat ramp / muscle ramp).
const FAT_RAMP=['#F87171','#EF4444','#B91C1C','#7F1D1D','#991B1B','#8B1A1A','#6E1515','#550F0F'];
const MU_RAMP =['#60A5FA','#3B82F6','#1D4ED8','#1E3A8A','#1E40AF','#172554','#0F1B4D','#0A153D'];
const fatColor=r=>FAT_RAMP[(r-1)%FAT_RAMP.length];
const muColor =r=>MU_RAMP[(r-1)%MU_RAMP.length];

const A={}; R.athletes.forEach(a=>A[a.name]=a);
const baseOf=a=>({bf:a.stages[0].fat,mu:a.stages[0].muscle});
const meas=(a,s)=>{const st=a.stages[s];return st&&st.present?{bf:st.fat,mu:st.muscle}:null;};
const lastMeas=a=>{for(let s=LATEST;s>=1;s--){const m=meas(a,s);if(m)return m;}return baseOf(a);};
const measuredNames=s=>NAMES.filter(n=>meas(A[n],s));
const mean=arr=>arr.reduce((x,y)=>x+y,0)/arr.length;

function sign(v){return v>=0?'+':'';}
function dpFat(d){return d==null?'':d<0?'dt-gf':d>0?'dt-bf':'dt-n';}
function dpMu(d){return d==null?'':d>0?'dt-gm':d<0?'dt-bm':'dt-n';}
function dpTxt(d){return d==null?'':d===0?'±0':`${sign(d)}${Math.abs(d).toFixed(2)}`;}
function bw(v,mn,mx){if(v==null)return 0;return Math.max(4,Math.min(96,(v-mn)/(mx-mn)*92+4));}
function ini(n){return n.substring(0,2).toUpperCase();}

// ---- Header date badges -----------------------------------------------------
(function(){
  let h='';
  for(let s=0;s<=LATEST;s++){
    const cls=s===LATEST?' latest':'';
    const lbl=s===0?'Baseline':('Round '+s)+(s===LATEST?' ✨':'');
    h+=`<div class="date-badge${cls}"><div class="lb">${lbl}</div><div class="vl">${R.STAGE_DATES[s]} 2026</div></div>`;
  }
  document.getElementById('header-dates').innerHTML=h;
})();

// ---- Summary strip ----------------------------------------------------------
(function(){
  const measured=measuredNames(LATEST);
  const dFat=mean(measured.map(n=>meas(A[n],LATEST).bf-baseOf(A[n]).bf));
  const dMu =mean(measured.map(n=>meas(A[n],LATEST).mu-baseOf(A[n]).mu));
  const absent=NAMES.length-measured.length;
  document.getElementById('summary-strip').innerHTML=`
    <div class="sc sc-gray"><div class="sc-label">Total Enrolled</div><div class="sc-val">${NAMES.length}</div><div class="sc-sub">Baseline participants</div></div>
    <div class="sc sc-green"><div class="sc-label">Round ${LATEST} Measured</div><div class="sc-val">${measured.length}</div><div class="sc-sub">${R.STAGE_DATES[LATEST]} 2026 · ${absent} absent</div></div>
    <div class="sc sc-fat"><div class="sc-label">Avg Body Fat Δ R${LATEST}</div><div class="sc-val">${sign(dFat)}${dFat.toFixed(2)} pp</div><div class="sc-sub">vs baseline · ${measured.length} pax</div></div>
    <div class="sc sc-muscle"><div class="sc-label">Avg Muscle Δ R${LATEST}</div><div class="sc-val">${sign(dMu)}${dMu.toFixed(2)} pp</div><div class="sc-sub">vs baseline · ${measured.length} pax</div></div>`;
})();

// ---- Legend -----------------------------------------------------------------
(function(){
  let h='<strong style="font-size:11px;color:#1E293B">Chart legend:</strong>';
  h+='<div class="legend-item"><div class="lswatch" style="background:#94A3B8"></div>Baseline</div>';
  for(let s=1;s<=LATEST;s++)h+=`<div class="legend-item"><div class="lswatch" style="background:${fatColor(s)}"></div>R${s} Body Fat</div>`;
  for(let s=1;s<=LATEST;s++)h+=`<div class="legend-item"><div class="lswatch" style="background:${muColor(s)}"></div>R${s} Muscle</div>`;
  h+='<div class="legend-item"><div class="lswatch" style="background:#22C55E"></div>Δ improved</div>';
  h+='<div class="legend-item"><div class="lswatch" style="background:#EF4444"></div>Δ regressed</div>';
  document.getElementById('legend').innerHTML=h;
})();

// ---- Average panel (one block per measured round) ---------------------------
(function(){
  const EMO=['','🔵','🟢','⚡','✨','🔶','🟣','🟠','⭐'];
  let h='';
  for(let s=1;s<=LATEST;s++){
    const m=measuredNames(s);
    const baseFat=mean(m.map(n=>baseOf(A[n]).bf)), roundFat=mean(m.map(n=>meas(A[n],s).bf));
    const baseMu =mean(m.map(n=>baseOf(A[n]).mu)), roundMu =mean(m.map(n=>meas(A[n],s).mu));
    const dF=roundFat-baseFat, dM=roundMu-baseMu;
    const fc=fatColor(s), mc=muColor(s);
    const fGood='background:rgba(34,197,94,.2);color:#16A34A', fBad='background:rgba(239,68,68,.2);color:#DC2626';
    const mGood='background:rgba(59,130,246,.2);color:#60A5FA', mBad='background:rgba(239,68,68,.2);color:#DC2626';
    h+=`<div>
      <div class="avg-round-title">${EMO[s]||'•'} Round ${s} · ${R.STAGE_DATES[s]} (${m.length} pax)</div>
      <div class="avg-row"><div class="avg-dot" style="background:#94A3B8"></div><div class="avg-lbl">Base Fat</div><div class="avg-val">${baseFat.toFixed(2)}%</div></div>
      <div class="avg-bar-wrap" style="background:rgba(239,68,68,.15)"><div class="avg-bar-fill" style="width:${(baseFat*2).toFixed(1)}%;background:#94A3B8"></div></div>
      <div class="avg-row"><div class="avg-dot" style="background:${fc}"></div><div class="avg-lbl">R${s} Fat</div><div class="avg-val">${roundFat.toFixed(2)}%</div><div class="avg-delta" style="${dF<=0?fGood:fBad}">${sign(dF)}${dF.toFixed(2)} pp</div></div>
      <div class="avg-bar-wrap" style="background:rgba(239,68,68,.15);margin-bottom:12px"><div class="avg-bar-fill" style="width:${(roundFat*2).toFixed(1)}%;background:${fc}"></div></div>
      <div class="avg-row"><div class="avg-dot" style="background:#94A3B8"></div><div class="avg-lbl">Base Muscle</div><div class="avg-val">${baseMu.toFixed(2)}%</div></div>
      <div class="avg-bar-wrap" style="background:rgba(59,130,246,.15)"><div class="avg-bar-fill" style="width:${baseMu.toFixed(1)}%;background:#94A3B8"></div></div>
      <div class="avg-row"><div class="avg-dot" style="background:${mc}"></div><div class="avg-lbl">R${s} Muscle</div><div class="avg-val">${roundMu.toFixed(2)}%</div><div class="avg-delta" style="${dM>=0?mGood:mBad}">${sign(dM)}${dM.toFixed(2)} pp</div></div>
      <div class="avg-bar-wrap" style="background:rgba(59,130,246,.15)"><div class="avg-bar-fill" style="width:${roundMu.toFixed(1)}%;background:${mc}"></div></div>
    </div>`;
  }
  document.getElementById('avg-rounds').innerHTML=h;
})();

// ---- Per-person cards -------------------------------------------------------
function getBadge(a){
  const b=baseOf(a);const p=lastMeasOrNull(a);
  if(!p)return['badge-skip','⏳ Pending'];
  const df=p.bf-b.bf,dm=p.mu-b.mu;
  if(df<=0&&dm>=0)return['badge-improved','✅ Improved'];
  if(df>0&&dm<0)return['badge-declined','⚠️ Regressed'];
  return['badge-mixed','〰️ Mixed'];
}
function lastMeasOrNull(a){for(let s=LATEST;s>=1;s--){const m=meas(a,s);if(m)return m;}return null;}

function buildCard(a){
  const name=a.name,color=colorMap[name],b=baseOf(a);
  const rounds=[];for(let s=1;s<=LATEST;s++){const m=meas(a,s);if(m)rounds.push({s,...m});}
  const[badgeClass,badgeText]=getBadge(a);
  const subtitle=rounds.length?rounds.map(r=>'R'+r.s).join(' + ')+' measured':'Pending';
  const allBF=[b.bf,...rounds.map(r=>r.bf)],allMu=[b.mu,...rounds.map(r=>r.mu)];
  const bfMin=Math.min(...allBF)-1.5,bfMax=Math.max(...allBF)+1.5;
  const muMin=Math.min(...allMu)-1.5,muMax=Math.max(...allMu)+1.5;
  function bar(val,clr,mn,mx){const pct=bw(val,mn,mx);const ins=pct>30;return`<div class="bar-outer"><div class="bar-inner" style="width:${pct}%;background:${clr}">${ins?`<span class="bar-value">${val.toFixed(1)}%</span>`:''}</div>${!ins?`<span style="position:absolute;left:calc(${pct}% + 4px);top:3px;font-size:9px;font-weight:700;color:${clr}">${val.toFixed(1)}%</span>`:''}</div>`;}
  const firstRound=rounds.length?rounds[0].s:0;
  const skipNote=(firstRound>1)?`<div class="skip-note">⚠️ First measured at Round ${firstRound} — deltas are vs baseline</div>`:'';
  let bfRows=`<div class="bar-row"><div class="bar-row-label">Baseline</div>${bar(b.bf,'#94A3B8',bfMin,bfMax)}<div class="delta-tag dt-n" style="visibility:hidden">—</div></div>`;
  let muRows=`<div class="bar-row"><div class="bar-row-label">Baseline</div>${bar(b.mu,'#94A3B8',muMin,muMax)}<div class="delta-tag dt-n" style="visibility:hidden">—</div></div>`;
  rounds.forEach(r=>{
    const df=+(r.bf-b.bf).toFixed(2),dm=+(r.mu-b.mu).toFixed(2);
    bfRows+=`<div class="bar-row"><div class="bar-row-label">Round ${r.s}</div>${bar(r.bf,fatColor(r.s),bfMin,bfMax)}<div class="delta-tag ${dpFat(df)}">${dpTxt(df)} pp</div></div>`;
    muRows+=`<div class="bar-row"><div class="bar-row-label">Round ${r.s}</div>${bar(r.mu,muColor(r.s),muMin,muMax)}<div class="delta-tag ${dpMu(dm)}">${dpTxt(dm)} pp</div></div>`;
  });
  return`<div class="person-card">
  <div class="card-header">
    <div class="card-identity"><div class="avatar" style="background:${color}">${ini(name)}</div><div class="name-text"><h3>${name}</h3><p>${subtitle}</p></div></div>
    <div class="badge ${badgeClass}">${badgeText}</div>
  </div>
  <div class="chart-section"><div class="chart-title">🔴 Body Fat %</div><div class="bar-chart">${bfRows}</div></div>
  <hr class="chart-divider">
  <div class="chart-section"><div class="chart-title">🔵 Muscle %</div><div class="bar-chart">${muRows}</div></div>
  ${skipNote}
</div>`;}

function buildMissedCard(a){
  const last=lastMeas(a);
  return`<div class="missed-card">
  <div style="display:flex;align-items:center;gap:9px;margin-bottom:10px">
    <div class="avatar" style="background:${colorMap[a.name]};width:30px;height:30px;font-size:11px">${ini(a.name)}</div>
    <div><div style="font-size:13px;font-weight:700">${a.name}</div><div style="font-size:10px;color:#94A3B8">Absent Round ${LATEST}</div></div>
    <div class="badge badge-skip" style="margin-left:auto">⏳ Absent</div>
  </div>
  <div style="display:flex;gap:20px;justify-content:center;padding:4px 0">
    <div style="text-align:center"><div style="font-size:9px;color:#EF4444;font-weight:700;text-transform:uppercase">Last BF%</div><div style="font-size:20px;font-weight:800;color:#EF4444">${last.bf.toFixed(1)}%</div></div>
    <div style="text-align:center"><div style="font-size:9px;color:#3B82F6;font-weight:700;text-transform:uppercase">Last Mu%</div><div style="font-size:20px;font-weight:800;color:#3B82F6">${last.mu.toFixed(1)}%</div></div>
  </div>
</div>`;}

(function(){
  const measured=measuredNames(LATEST).sort((a,b)=>a.localeCompare(b));
  const pending=NAMES.filter(n=>!meas(A[n],LATEST)).sort((a,b)=>a.localeCompare(b));
  document.getElementById('measured-title').innerHTML=`✨ Round ${LATEST} Measured <span>— ${measured.length} participants · ${R.STAGE_DATES[LATEST]} 2026</span>`;
  document.getElementById('cards-measured').innerHTML=measured.map(n=>buildCard(A[n])).join('');
  document.getElementById('absent-title').innerHTML=`⏳ Absent Round ${LATEST} <span>— not measured on ${R.STAGE_DATES[LATEST]} 2026</span>`;
  document.getElementById('cards-pending').innerHTML=pending.map(n=>buildMissedCard(A[n])).join('') || '<div style="font-size:11px;color:#94A3B8;padding:6px">Everyone measured this round 🎉</div>';
  document.getElementById('footer').innerHTML=`Data source: Mija Body Composition Scale S400 &nbsp;·&nbsp; Campaign: ${R.STAGE_DATES[0]} – ${R.STAGE_DATES[LATEST]} 2026 &nbsp;·&nbsp; ${NAMES.length} participants`;
})();
</script>
</body>
</html>
