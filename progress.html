<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fat &amp; Muscle Challenge — Progress</title>
<style>
  :root{
    --black:#111111;--white:#FFFFFF;--snow:#FAFAFA;
    --grey-100:#F5F5F5;--grey-200:#E5E5E5;--grey-300:#CACACB;--grey-500:#707072;
    --red:#D30005;--green:#007D48;--blue:#1151FF;
    --sans:'Helvetica Neue',Helvetica,Arial,sans-serif;
    --display:'Arial Narrow','Helvetica Neue',Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--white);color:var(--black);padding:0;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1440px;margin:0 auto;padding:40px 48px 56px;}
  @media(max-width:640px){.wrap{padding:24px 20px 40px;}}

  .page-header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;border-bottom:1px solid var(--grey-200);padding-bottom:24px;margin-bottom:28px;}
  .page-header .eyebrow{font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--grey-500);margin-bottom:12px;}
  .page-header h1{font-family:var(--display);font-weight:800;text-transform:uppercase;line-height:.9;letter-spacing:-.01em;font-size:clamp(40px,7vw,72px);}
  .header-dates{display:flex;gap:6px;flex-wrap:wrap;}
  .date-badge{border:1px solid var(--grey-300);border-radius:30px;padding:7px 13px;text-align:center;}
  .date-badge.latest{background:var(--black);border-color:var(--black);}
  .date-badge.latest .lb,.date-badge.latest .vl{color:#fff;}
  .date-badge .lb{font-size:10px;color:var(--grey-500);text-transform:uppercase;letter-spacing:.06em;}
  .date-badge .vl{font-size:11px;font-weight:500;color:var(--black);margin-top:2px;}

  .summary-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--grey-200);border:1px solid var(--grey-200);margin-bottom:32px;}
  .sc{background:var(--white);padding:20px 22px;}
  .sc-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--grey-500);}
  .sc-val{font-family:var(--display);font-weight:800;font-size:40px;line-height:1;margin:8px 0 4px;letter-spacing:-.01em;}
  .sc-sub{font-size:12px;color:var(--grey-500);}

  .legend{display:flex;gap:14px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
  .legend strong{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--black);}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--grey-500);}
  .lswatch{width:14px;height:10px;border-radius:2px;}

  .avg-panel{background:var(--snow);border:1px solid var(--grey-200);border-radius:20px;padding:24px 26px;margin-bottom:32px;}
  .avg-panel h2{font-family:var(--display);font-weight:800;text-transform:uppercase;letter-spacing:-.01em;font-size:22px;margin-bottom:16px;}
  .avg-rounds{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
  .avg-round-title{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--grey-500);margin-bottom:12px;font-weight:500;}
  .avg-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .avg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .avg-lbl{font-size:11px;color:var(--grey-500);width:80px;flex-shrink:0;}
  .avg-val{font-size:12px;font-weight:500;color:var(--black);font-variant-numeric:tabular-nums;}
  .avg-delta{font-size:11px;font-weight:500;padding:2px 7px;border-radius:30px;margin-left:auto;font-variant-numeric:tabular-nums;}
  .avg-bar-wrap{height:4px;border-radius:3px;margin-bottom:8px;background:var(--grey-100);}
  .avg-bar-fill{height:100%;border-radius:3px;}

  .section-title{font-size:12px;font-weight:500;color:var(--black);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--grey-200);display:flex;align-items:center;gap:8px;}
  .section-title span{font-size:11px;font-weight:400;text-transform:none;color:var(--grey-500);letter-spacing:0;}
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px;margin-bottom:32px;}
  .person-card{background:var(--white);border:1px solid var(--grey-200);border-radius:20px;padding:20px 22px;}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .card-identity{display:flex;align-items:center;gap:10px;}
  .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
  .name-text h3{font-size:15px;font-weight:500;}
  .name-text p{font-size:11px;color:var(--grey-500);margin-top:1px;}
  .badge{font-size:10px;font-weight:500;padding:4px 11px;border-radius:30px;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em;}
  .badge-improved{background:#DFFFE9;color:var(--green);}
  .badge-declined{background:#FFE5E5;color:var(--red);}
  .badge-mixed{background:var(--grey-100);color:var(--grey-500);}
  .badge-skip{background:var(--grey-100);color:var(--grey-500);}
  .chart-section{margin-top:2px;}
  .chart-title{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--grey-500);margin-bottom:9px;}
  .bar-chart{display:flex;flex-direction:column;gap:7px;}
  .bar-row{display:flex;align-items:center;gap:8px;}
  .bar-row-label{font-size:10px;color:var(--grey-500);width:58px;flex-shrink:0;text-align:right;}
  .bar-outer{flex:1;background:var(--grey-100);border-radius:4px;height:18px;position:relative;overflow:hidden;}
  .bar-inner{height:100%;border-radius:4px;position:relative;display:flex;align-items:center;}
  .bar-value{position:absolute;right:6px;font-size:9px;font-weight:700;color:#fff;white-space:nowrap;}
  .delta-tag{font-size:10px;font-weight:500;padding:1px 6px;border-radius:30px;flex-shrink:0;width:56px;text-align:center;font-variant-numeric:tabular-nums;}
  .dt-gf{background:#DFFFE9;color:var(--green);}
  .dt-bf{background:#FFE5E5;color:var(--red);}
  .dt-gm{background:#D6EEFF;color:var(--blue);}
  .dt-bm{background:#FFE5E5;color:var(--red);}
  .dt-n{background:var(--grey-100);color:var(--grey-500);}
  .chart-divider{border:none;border-top:1px solid var(--grey-200);margin:12px 0;}
  .skip-note{background:var(--grey-100);border:1px solid var(--grey-200);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--grey-500);margin-top:12px;}
  .missed-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:24px;}
  .missed-card{background:var(--white);border:1px dashed var(--grey-300);border-radius:20px;padding:16px 18px;}
  .footer{text-align:left;font-size:12px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--grey-500);padding-top:20px;border-top:1px solid var(--grey-200);}
  @media(max-width:640px){.summary-strip{grid-template-columns:1fr 1fr;}.avg-rounds{grid-template-columns:1fr;}.cards-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">

<div class="page-header">
  <div>
    <div class="eyebrow">Mija Body Composition Scale S400 · vs baseline per round</div>
    <h1>Progress<br>Tracker</h1>
  </div>
  <div class="header-dates" id="header-dates"></div>
</div>

<div class="summary-strip" id="summary-strip"></div>

<div class="legend" id="legend"></div>

<div class="avg-panel">
  <h2>Group Averages — Round by Round</h2>
  <div class="avg-rounds" id="avg-rounds"></div>
</div>

<div class="section-title" id="measured-title"></div>
<div class="cards-grid" id="cards-measured"></div>

<div class="section-title" id="absent-title"></div>
<div class="missed-grid" id="cards-pending"></div>

<div class="footer" id="footer"></div>

</div>
<!-- Data is generated from the spreadsheet by build_data.py -->
<script src="data.js"></script>
<script>
const R = window.RACE;
const NAMES = R.NAMES;
const LATEST = R.LATEST;
// Per-round bar colours: baseline grey, then a fat ramp / muscle ramp (the data colour).
const FAT_RAMP=['#FCA5A5','#EE0005','#B91C1C','#7F1D1D','#991B1B','#8B1A1A','#6E1515','#550F0F'];
const MU_RAMP =['#9CC3FF','#1151FF','#0B3FCC','#0A2E99','#1E40AF','#172554','#0F1B4D','#0A153D'];
const fatColor=r=>FAT_RAMP[(r-1)%FAT_RAMP.length];
const muColor =r=>MU_RAMP[(r-1)%MU_RAMP.length];

const A={}; R.athletes.forEach(a=>A[a.name]=a);
const baseOf=a=>({bf:a.stages[0].fat,mu:a.stages[0].muscle});
const meas=(a,s)=>{const st=a.stages[s];return st&&st.present?{bf:st.fat,mu:st.muscle}:null;};
const lastMeas=a=>{for(let s=LATEST;s>=1;s--){const m=meas(a,s);if(m)return m;}return baseOf(a);};
const measuredNames=s=>NAMES.filter(n=>meas(A[n],s));
const mean=arr=>arr.reduce((x,y)=>x+y,0)/arr.length;
const avColor=n=>A[n].style?A[n].style.color:'#707072';

function sign(v){return v>=0?'+':'−';}
function dpFat(d){return d==null?'':d<0?'dt-gf':d>0?'dt-bf':'dt-n';}
function dpMu(d){return d==null?'':d>0?'dt-gm':d<0?'dt-bm':'dt-n';}
function dpTxt(d){return d==null?'':d===0?'±0':`${sign(d)}${Math.abs(d).toFixed(2)}`;}
function bw(v,mn,mx){if(v==null)return 0;return Math.max(4,Math.min(96,(v-mn)/(mx-mn)*92+4));}
function ini(n){return n.substring(0,2).toUpperCase();}

(function(){
  let h='';
  for(let s=0;s<=LATEST;s++){
    const cls=s===LATEST?' latest':'';
    const lbl=s===0?'Baseline':('Round '+s);
    h+=`<div class="date-badge${cls}"><div class="lb">${lbl}</div><div class="vl">${R.STAGE_DATES[s]} 2026</div></div>`;
  }
  document.getElementById('header-dates').innerHTML=h;
})();

(function(){
  const measured=measuredNames(LATEST);
  const dFat=mean(measured.map(n=>meas(A[n],LATEST).bf-baseOf(A[n]).bf));
  const dMu =mean(measured.map(n=>meas(A[n],LATEST).mu-baseOf(A[n]).mu));
  const absent=NAMES.length-measured.length;
  document.getElementById('summary-strip').innerHTML=`
    <div class="sc"><div class="sc-label">Total Enrolled</div><div class="sc-val">${NAMES.length}</div><div class="sc-sub">Baseline participants</div></div>
    <div class="sc"><div class="sc-label">Round ${LATEST} Measured</div><div class="sc-val">${measured.length}</div><div class="sc-sub">${R.STAGE_DATES[LATEST]} 2026 · ${absent} absent</div></div>
    <div class="sc"><div class="sc-label">Avg Body Fat Δ R${LATEST}</div><div class="sc-val">${sign(dFat)}${Math.abs(dFat).toFixed(2)}</div><div class="sc-sub">pp vs baseline · ${measured.length} pax</div></div>
    <div class="sc"><div class="sc-label">Avg Muscle Δ R${LATEST}</div><div class="sc-val">${sign(dMu)}${Math.abs(dMu).toFixed(2)}</div><div class="sc-sub">pp vs baseline · ${measured.length} pax</div></div>`;
})();

(function(){
  let h='<strong>Legend</strong>';
  h+='<div class="legend-item"><div class="lswatch" style="background:#CACACB"></div>Baseline</div>';
  for(let s=1;s<=LATEST;s++)h+=`<div class="legend-item"><div class="lswatch" style="background:${fatColor(s)}"></div>R${s} Fat</div>`;
  for(let s=1;s<=LATEST;s++)h+=`<div class="legend-item"><div class="lswatch" style="background:${muColor(s)}"></div>R${s} Muscle</div>`;
  document.getElementById('legend').innerHTML=h;
})();

(function(){
  let h='';
  for(let s=1;s<=LATEST;s++){
    const m=measuredNames(s);
    const baseFat=mean(m.map(n=>baseOf(A[n]).bf)), roundFat=mean(m.map(n=>meas(A[n],s).bf));
    const baseMu =mean(m.map(n=>baseOf(A[n]).mu)), roundMu =mean(m.map(n=>meas(A[n],s).mu));
    const dF=roundFat-baseFat, dM=roundMu-baseMu;
    const fc=fatColor(s), mc=muColor(s);
    const fGood='background:#DFFFE9;color:#007D48', fBad='background:#FFE5E5;color:#D30005';
    const mGood='background:#D6EEFF;color:#1151FF', mBad='background:#FFE5E5;color:#D30005';
    h+=`<div>
      <div class="avg-round-title">Round ${s} · ${R.STAGE_DATES[s]} (${m.length} pax)</div>
      <div class="avg-row"><div class="avg-dot" style="background:#CACACB"></div><div class="avg-lbl">Base Fat</div><div class="avg-val">${baseFat.toFixed(2)}%</div></div>
      <div class="avg-bar-wrap"><div class="avg-bar-fill" style="width:${(baseFat*2).toFixed(1)}%;background:#CACACB"></div></div>
      <div class="avg-row"><div class="avg-dot" style="background:${fc}"></div><div class="avg-lbl">R${s} Fat</div><div class="avg-val">${roundFat.toFixed(2)}%</div><div class="avg-delta" style="${dF<=0?fGood:fBad}">${sign(dF)}${Math.abs(dF).toFixed(2)} pp</div></div>
      <div class="avg-bar-wrap" style="margin-bottom:12px"><div class="avg-bar-fill" style="width:${(roundFat*2).toFixed(1)}%;background:${fc}"></div></div>
      <div class="avg-row"><div class="avg-dot" style="background:#CACACB"></div><div class="avg-lbl">Base Muscle</div><div class="avg-val">${baseMu.toFixed(2)}%</div></div>
      <div class="avg-bar-wrap"><div class="avg-bar-fill" style="width:${baseMu.toFixed(1)}%;background:#CACACB"></div></div>
      <div class="avg-row"><div class="avg-dot" style="background:${mc}"></div><div class="avg-lbl">R${s} Muscle</div><div class="avg-val">${roundMu.toFixed(2)}%</div><div class="avg-delta" style="${dM>=0?mGood:mBad}">${sign(dM)}${Math.abs(dM).toFixed(2)} pp</div></div>
      <div class="avg-bar-wrap"><div class="avg-bar-fill" style="width:${roundMu.toFixed(1)}%;background:${mc}"></div></div>
    </div>`;
  }
  document.getElementById('avg-rounds').innerHTML=h;
})();

function lastMeasOrNull(a){for(let s=LATEST;s>=1;s--){const m=meas(a,s);if(m)return m;}return null;}
function getBadge(a){
  const b=baseOf(a);const p=lastMeasOrNull(a);
  if(!p)return['badge-skip','Pending'];
  const df=p.bf-b.bf,dm=p.mu-b.mu;
  if(df<=0&&dm>=0)return['badge-improved','Improved'];
  if(df>0&&dm<0)return['badge-declined','Regressed'];
  return['badge-mixed','Mixed'];
}
function buildCard(a){
  const name=a.name,color=avColor(name),b=baseOf(a);
  const rounds=[];for(let s=1;s<=LATEST;s++){const m=meas(a,s);if(m)rounds.push({s,...m});}
  const[badgeClass,badgeText]=getBadge(a);
  const subtitle=rounds.length?rounds.map(r=>'R'+r.s).join(' + ')+' measured':'Pending';
  const allBF=[b.bf,...rounds.map(r=>r.bf)],allMu=[b.mu,...rounds.map(r=>r.mu)];
  const bfMin=Math.min(...allBF)-1.5,bfMax=Math.max(...allBF)+1.5;
  const muMin=Math.min(...allMu)-1.5,muMax=Math.max(...allMu)+1.5;
  function bar(val,clr,mn,mx){const pct=bw(val,mn,mx);const ins=pct>30;return`<div class="bar-outer"><div class="bar-inner" style="width:${pct}%;background:${clr}">${ins?`<span class="bar-value">${val.toFixed(1)}%</span>`:''}</div>${!ins?`<span style="position:absolute;left:calc(${pct}% + 4px);top:3px;font-size:9px;font-weight:700;color:${clr}">${val.toFixed(1)}%</span>`:''}</div>`;}
  const firstRound=rounds.length?rounds[0].s:0;
  const skipNote=(firstRound>1)?`<div class="skip-note">First measured at Round ${firstRound} — deltas are vs baseline</div>`:'';
  let bfRows=`<div class="bar-row"><div class="bar-row-label">Baseline</div>${bar(b.bf,'#CACACB',bfMin,bfMax)}<div class="delta-tag dt-n" style="visibility:hidden">—</div></div>`;
  let muRows=`<div class="bar-row"><div class="bar-row-label">Baseline</div>${bar(b.mu,'#CACACB',muMin,muMax)}<div class="delta-tag dt-n" style="visibility:hidden">—</div></div>`;
  rounds.forEach(r=>{
    const df=+(r.bf-b.bf).toFixed(2),dm=+(r.mu-b.mu).toFixed(2);
    bfRows+=`<div class="bar-row"><div class="bar-row-label">Round ${r.s}</div>${bar(r.bf,fatColor(r.s),bfMin,bfMax)}<div class="delta-tag ${dpFat(df)}">${dpTxt(df)} pp</div></div>`;
    muRows+=`<div class="bar-row"><div class="bar-row-label">Round ${r.s}</div>${bar(r.mu,muColor(r.s),muMin,muMax)}<div class="delta-tag ${dpMu(dm)}">${dpTxt(dm)} pp</div></div>`;
  });
  return`<div class="person-card">
  <div class="card-header">
    <div class="card-identity"><div class="avatar" style="background:${color}">${ini(name)}</div><div class="name-text"><h3>${name}</h3><p>${subtitle}</p></div></div>
    <div class="badge ${badgeClass}">${badgeText}</div>
  </div>
  <div class="chart-section"><div class="chart-title">Body Fat %</div><div class="bar-chart">${bfRows}</div></div>
  <hr class="chart-divider">
  <div class="chart-section"><div class="chart-title">Muscle %</div><div class="bar-chart">${muRows}</div></div>
  ${skipNote}
</div>`;}

function buildMissedCard(a){
  const last=lastMeas(a);
  return`<div class="missed-card">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
    <div class="avatar" style="background:${avColor(a.name)};width:30px;height:30px;font-size:11px">${ini(a.name)}</div>
    <div><div style="font-size:14px;font-weight:500">${a.name}</div><div style="font-size:11px;color:#707072">Absent Round ${LATEST}</div></div>
    <div class="badge badge-skip" style="margin-left:auto">Absent</div>
  </div>
  <div style="display:flex;gap:24px;justify-content:center;padding:6px 0">
    <div style="text-align:center"><div style="font-size:10px;color:#707072;font-weight:500;text-transform:uppercase;letter-spacing:.04em">Last BF%</div><div style="font-family:var(--display);font-size:26px;font-weight:800">${last.bf.toFixed(1)}</div></div>
    <div style="text-align:center"><div style="font-size:10px;color:#707072;font-weight:500;text-transform:uppercase;letter-spacing:.04em">Last Mu%</div><div style="font-family:var(--display);font-size:26px;font-weight:800">${last.mu.toFixed(1)}</div></div>
  </div>
</div>`;}

(function(){
  const measured=measuredNames(LATEST).sort((a,b)=>a.localeCompare(b));
  const pending=NAMES.filter(n=>!meas(A[n],LATEST)).sort((a,b)=>a.localeCompare(b));
  document.getElementById('measured-title').innerHTML=`Round ${LATEST} Measured <span>— ${measured.length} athletes · ${R.STAGE_DATES[LATEST]} 2026</span>`;
  document.getElementById('cards-measured').innerHTML=measured.map(n=>buildCard(A[n])).join('');
  document.getElementById('absent-title').innerHTML=`Absent Round ${LATEST} <span>— not measured on ${R.STAGE_DATES[LATEST]} 2026</span>`;
  document.getElementById('cards-pending').innerHTML=pending.map(n=>buildMissedCard(A[n])).join('') || '<div style="font-size:12px;color:#707072;padding:6px">Everyone measured this round.</div>';
  document.getElementById('footer').innerHTML=`Mija Body Composition Scale S400 &nbsp;·&nbsp; ${R.STAGE_DATES[0]} – ${R.STAGE_DATES[LATEST]} 2026 &nbsp;·&nbsp; ${NAMES.length} athletes`;
})();
</script>
</body>
</html>
